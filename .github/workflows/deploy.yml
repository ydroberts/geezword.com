# Auto-deploy geezword.com to SiteGround.
#
# Every push to `master` uploads the changed files to SiteGround over FTPS.
# No File Manager, no FileZilla — `git push` is the deploy.
#
# One-time setup — add three repository secrets at:
#   GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#     FTP_SERVER    SiteGround FTP host (e.g. ftp.geezword.com, or the server
#                   hostname shown in Site Tools -> Devs -> FTP Accounts)
#     FTP_USERNAME  the FTP account username
#     FTP_PASSWORD  that FTP account's password
#
# Note on `server-dir` below: it must point at the web root. If your FTP
# account already opens *inside* public_html, change it to `./`.

name: Deploy to SiteGround

on:
  push:
    branches: [master]
  workflow_dispatch:        # also allows a manual deploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ./public_html/
          # Repo housekeeping files that should never reach the live site.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/*.md
            **/*.zip
            **/desktop.ini
            httpsgeezword.comads.txt.txt
