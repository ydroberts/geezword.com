<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#101535"/>
      <stop offset="70%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5beaff"/>
      <stop offset="100%" stop-color="#00aacc"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <g fill="url(#cyan)" filter="url(#glow)">
    <rect x="22" y="22" width="4" height="4"/>
    <rect x="26" y="22" width="4" height="4"/>
    <rect x="22" y="26" width="4" height="4"/>
    <rect x="70" y="22" width="4" height="4"/>
    <rect x="74" y="22" width="4" height="4"/>
    <rect x="74" y="26" width="4" height="4"/>
    <rect x="22" y="70" width="4" height="4"/>
    <rect x="22" y="74" width="4" height="4"/>
    <rect x="26" y="74" width="4" height="4"/>
    <rect x="74" y="70" width="4" height="4"/>
    <rect x="70" y="74" width="4" height="4"/>
    <rect x="74" y="74" width="4" height="4"/>
  </g>
  <text x="50" y="69" text-anchor="middle"
        font-family="'Noto Sans Ethiopic','Nyala','Abyssinica SIL','Kefa',serif"
        font-size="50" font-weight="700"
        fill="url(#cyan)" filter="url(#glow)">ሀ</text>
  <g fill="#ff44aa">
    <rect x="48" y="16" width="4" height="4"/>
    <rect x="48" y="80" width="4" height="4"/>
    <rect x="16" y="48" width="4" height="4"/>
    <rect x="80" y="48" width="4" height="4"/>
  </g>
</svg>
